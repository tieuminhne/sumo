<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>SUMO QUÁN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            flex-direction: column;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.3);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #d4af37;
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div class="title">SUMO QUÁN</div>
    <div style="font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 8px;">Đang kiểm tra tài khoản...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        window.onload = async function() {
            try {
                const session = await getSession();
                if (session && session.user) {
                    // Đã đăng nhập -> chuyển vào owner dashboard
                    window.location.replace('owner.html');
                } else {
                    // Chưa đăng nhập -> bắt buộc login
                    window.location.replace('login.html');
                }
            } catch (err) {
                // Lỗi -> về login
                window.location.replace('login.html');
            }
        };
    </script>
</body>
</html>
