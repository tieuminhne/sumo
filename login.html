<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Đăng Nhập - SUMO QUÁN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--primary:#c41e3a;--gold:#d4af37;--dark:#1a1a2e}
        html,body{min-height:100vh;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#1a1a2e 100%);color:#fff;display:flex;align-items:center;justify-content:center}
        .auth-container{width:100%;max-width:420px;padding:20px}
        .auth-card{background:linear-gradient(145deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.02) 100%);backdrop-filter:blur(20px);border-radius:28px;padding:40px 28px;box-shadow:0 30px 80px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);text-align:center}
        .auth-logo{font-size:60px;margin-bottom:16px}
        .auth-title{font-size:28px;font-weight:800;margin-bottom:8px;color:#fff}
        .auth-subtitle{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:32px}
        .form-group{margin-bottom:18px;text-align:left}
        .form-label{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:1px}
        .form-input{width:100%;padding:16px;font-size:15px;border:2px solid rgba(255,255,255,0.15);border-radius:14px;background:rgba(255,255,255,0.05);color:#fff;outline:0;transition:all 0.3s}
        .form-input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,175,55,0.15)}
        .form-input::placeholder{color:rgba(255,255,255,0.3)}
        .auth-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--gold) 0%,#b8962e 100%);color:var(--dark);border:none;border-radius:16px;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 10px 30px rgba(212,175,55,0.4);transition:all 0.3s;letter-spacing:1px;text-transform:uppercase;margin-top:8px}
        .auth-btn:hover{transform:translateY(-2px);box-shadow:0 15px 45px rgba(212,175,55,0.5)}
        .auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .auth-link{margin-top:24px;font-size:14px;color:rgba(255,255,255,0.5)}
        .auth-link a{color:var(--gold);text-decoration:none;font-weight:700}
        .auth-link a:hover{text-decoration:underline}
        .auth-error{background:rgba(196,30,58,0.2);color:#ff6b6b;padding:14px;border-radius:12px;font-size:13px;margin-bottom:16px;display:none;border:1px solid rgba(196,30,58,0.3)}
        .auth-error.show{display:block}
        .auth-success{background:rgba(76,175,80,0.2);color:#4caf50;padding:14px;border-radius:12px;font-size:13px;margin-bottom:16px;display:none;border:1px solid rgba(76,175,80,0.3)}
        .auth-success.show{display:block}
        .divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:rgba(255,255,255,0.3);font-size:12px}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">🍜</div>
            <div class="auth-title">SUMO QUÁN</div>
            <div class="auth-subtitle">Đăng nhập để quản lý quán của bạn</div>

            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <div class="form-label">Email</div>
                    <input type="email" class="form-input" id="loginEmail" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <div class="form-label">Mật khẩu</div>
                    <input type="password" class="form-input" id="loginPassword" placeholder="Nhập mật khẩu" required minlength="6">
                </div>
                <button type="submit" class="auth-btn" id="loginBtn">Đăng Nhập</button>
            </form>

            <div class="auth-link">
                Chưa có tài khoản? <a href="register.html">Đăng ký quán mới</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        (async () => {
            const session = await getSession();
            if (session) {
                _currentUser = session.user;
                await loadUserShop();
                window.location.href = 'food.html';
            }
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('authError');
            const successEl = document.getElementById('authSuccess');
            errEl.classList.remove('show');
            successEl.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';

            try {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                await signIn(email, password);
                successEl.textContent = 'Đăng nhập thành công! Đang chuyển...';
                successEl.classList.add('show');
                setTimeout(() => { window.location.href = 'food.html'; }, 800);
            } catch (err) {
                errEl.textContent = err.message === 'Invalid login credentials'
                    ? 'Email hoặc mật khẩu không đúng'
                    : err.message;
                errEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Đăng Nhập';
            }
        }
    </script>
</body>
</html>
